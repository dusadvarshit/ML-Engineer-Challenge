# Model Configuration
models:
  classification:
    name: "efficientnet_b0"
    input_size: [224, 224]
    num_classes: 100
    batch_size: 32
    device: "cuda"
    
  detection:
    name: "yolov5s"
    input_size: [640, 640]
    confidence_threshold: 0.5
    iou_threshold: 0.45
    
  similarity:
    name: "clip_vit_b32"
    input_size: [224, 224]
    embedding_dim: 512

optimization:
  quantization:
    enabled: true
    method: "dynamic"
  
  pruning:
    enabled: false
    sparsity: 0.2
  
  tensorrt:
    enabled: false
    precision: "fp16"
